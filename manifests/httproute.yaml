apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
  namespace: bakseter-no
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cloudflared-gateway
      namespace: cloudflared

  hostnames:
    - bakseter.no

  rules:
    - matches:
        - path:
            type: Exact
            value: /
        - path:
            type: Exact
            value: /favicon.ico

      backendRefs:
        - group: ''
          kind: Service
          name: web
          port: 80
          weight: 1
